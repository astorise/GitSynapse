apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: git-faas-layer
  namespace: default
spec:
  template:
    metadata:
      annotations:
        linkerd.io/inject: "enabled"
    spec:
      containers:
        - image: git-faas-layer:latest
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: GITLAB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: gitlab-credentials
                  key: token
          resources:
            limits:
              cpu: "1"
              memory: "512Mi"
            requests:
              cpu: "100m"
              memory: "128Mi"
